# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# ===========================================================
# Sveltia CMS Configuration
# Ad Value Home Improvement
#
# This file lives at: public/admin/config.yml
# CMS is accessible at: /admin/
#
# Sveltia supports GitHub/GitLab/Gitea-Forgejo backends.
# This project uses GitHub.
#
# Docs: https://github.com/sveltia/sveltia-cms
# Netlify CMS docs: https://www.netlifycms.org/docs/
# ===========================================================

backend:
  name: github
  repo: seegodesign/ad-value-home-improvement
  branch: main
  base_url: https://ad-value-sveltia-cms-auth.seegodesign.workers.dev

# Media files (uploaded images)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Site URL (used for previews)
site_url: https://advaluekauai.com

# CMS display name
display_url: https://advaluekauai.com

# Slug options
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:

  # -----------------------------------------------------------
  # SITE SETTINGS
  # -----------------------------------------------------------
  - name: settings
    label: "Company Settings"
    description: "company settings — business info, contact, hours"
    files:
      - name: general
        label: "Company Settings"
        file: "src/data/settings.json"
        fields:
          - { label: "Business Name", name: businessName, widget: string }
          - { label: "Tagline", name: tagline, widget: string }
          - { label: "Phone Number", name: phone, widget: string, hint: "e.g. 808-977-2334" }
          - { label: "Email", name: email, widget: string }
          - label: "Address"
            name: address
            widget: object
            fields:
              - { label: "Street/Area", name: street, widget: string }
              - { label: "City/Island", name: city, widget: string }
              - { label: "State", name: state, widget: string }
              - { label: "ZIP", name: zip, widget: string }
          - label: "Business Hours"
            name: hours
            widget: object
            fields:
              - { label: "Weekday Hours", name: weekdays, widget: string }
              - { label: "Saturday Hours", name: saturday, widget: string }
              - { label: "Sunday Hours", name: sunday, widget: string }
          - label: "Service Areas"
            name: serviceAreas
            widget: list
            field: { label: "Area", name: area, widget: string }
          - label: "Social Links"
            name: social
            widget: object
            fields:
              - { label: "Facebook URL", name: facebook, widget: string, required: false }
              - { label: "Instagram URL", name: instagram, widget: string, required: false }
              - { label: "Nextdoor URL", name: nextdoor, widget: string, required: false }
          - { label: "Founded Year", name: foundedYear, widget: string }
          - { label: "Owner Name", name: ownerName, widget: string }

  # -----------------------------------------------------------
  # HOMEPAGE CONTENT
  # -----------------------------------------------------------
  - name: homepage
    label: "Homepage"
    description: "Edit all homepage sections"
    files:
      - name: hero
        label: "Hero Section"
        file: "src/data/homepage.json"
        fields:
          - { label: "Headline", name: headline, widget: string }
          - { label: "Supporting Text", name: support, widget: string }
          - { label: "Trust Line", name: trustLine, widget: string }
          - { label: "Primary Button Label", name: primaryCtaLabel, widget: string }
          - { label: "Primary Button URL", name: primaryCtaHref, widget: string }
          - { label: "Secondary Button Label", name: secondaryCtaLabel, widget: string }
          - { label: "Secondary Button URL", name: secondaryCtaHref, widget: string }
          - label: "Hero Image"
            name: imageSrc
            widget: image
            required: false
          - { label: "Hero Image Alt Text", name: imageAlt, widget: string }
          - label: "Service Tags"
            name: serviceTags
            widget: list
            fields:
              - { label: "Label", name: label, widget: string }
              - { label: "URL", name: href, widget: string }

      - name: stats
        label: "Stats / Trust Bar"
        file: "src/data/homepage-stats.json"
        fields:
          - label: "Stats"
            name: stats
            widget: list
            fields:
              - { label: "Number / Value", name: number, widget: string }
              - { label: "Label", name: label, widget: string }

      - name: services_section
        label: "Services Section"
        file: "src/data/homepage-services.json"
        fields:
          - { label: "Eyebrow", name: eyebrow, widget: string }
          - { label: "Heading", name: heading, widget: string }
          - { label: "Subtitle", name: subtitle, widget: string }

      - name: about_preview
        label: "About Preview Section"
        file: "src/data/homepage-about.json"
        fields:
          - { label: "Eyebrow", name: eyebrow, widget: string }
          - { label: "Heading", name: heading, widget: string }
          - { label: "Pull Quote", name: quote, widget: text }
          - { label: "Body Text", name: body, widget: text }
          - { label: "Signature Name", name: sigName, widget: string }
          - { label: "Signature Title", name: sigTitle, widget: string }

      - name: outcomes
        label: "Outcomes Section"
        file: "src/data/homepage-outcomes.json"
        fields:
          - { label: "Eyebrow", name: eyebrow, widget: string }
          - { label: "Heading", name: heading, widget: string }
          - { label: "Subtitle", name: subtitle, widget: string }
          - label: "Outcome Cards"
            name: outcomes
            widget: list
            fields:
              - { label: "ID (no spaces)", name: id, widget: string }
              - { label: "Title", name: title, widget: string }
              - label: "Color Theme"
                name: color
                widget: select
                options: [navy, green, brown, sand]
              - label: "Service Items"
                name: items
                widget: list
                field: { label: "Item", name: item, widget: string }

      - name: gallery_section
        label: "Gallery Section"
        file: "src/data/homepage-gallery.json"
        fields:
          - { label: "Eyebrow", name: eyebrow, widget: string }
          - { label: "Heading", name: heading, widget: string }
          - { label: "Subtitle", name: subtitle, widget: string }

      - name: reviews_section
        label: "Reviews Section"
        file: "src/data/homepage-reviews.json"
        fields:
          - { label: "Eyebrow", name: eyebrow, widget: string }
          - { label: "Heading", name: heading, widget: string }
          - { label: "Subtitle", name: subtitle, widget: string }

      - name: cta_section
        label: "CTA Section"
        file: "src/data/homepage-cta.json"
        fields:
          - { label: "Eyebrow", name: eyebrow, widget: string }
          - { label: "Title", name: title, widget: string }
          - { label: "Subtitle", name: subtitle, widget: string }
          - { label: "Primary Button Label", name: primaryLabel, widget: string }
          - { label: "Secondary Button Label", name: secondaryLabel, widget: string, hint: "Phone number from Settings is appended automatically" }
          - { label: "Trust Note", name: note, widget: string }

  # -----------------------------------------------------------
  # ABOUT PAGE
  # -----------------------------------------------------------
  - name: about
    label: "About Page"
    files:
      - name: about_content
        label: "About Content"
        file: "src/data/about.json"
        fields:
          - { label: "Owner Name", name: ownerName, widget: string }
          - { label: "Owner Title", name: ownerTitle, widget: string }
          - label: "Owner Photo"
            name: ownerPhoto
            widget: image
            required: false
          - label: "Bio Paragraphs"
            name: bio
            widget: list
            field: { label: "Paragraph", name: text, widget: text }
          - { label: "Closing Signature Text", name: signature, widget: string }
          - label: "Values / What We Stand For"
            name: values
            widget: list
            fields:
              - label: "Icon"
                name: icon
                widget: select
                options:
                  - arrow-path
                  - badge-check
                  - beaker
                  - bolt
                  - building-office-2
                  - calendar-days
                  - chat-bubble-left-right
                  - check
                  - clipboard-document-list
                  - clock
                  - globe-alt
                  - hand-raised
                  - home
                  - leaf
                  - map-pin
                  - paint-brush
                  - shield-check
                  - sparkles
                  - squares-2x2
                  - sun
                  - wrench-screwdriver
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: desc, widget: text }
          - label: "Proven Track Record Stats"
            name: stats
            widget: list
            fields:
              - { label: "Number / Value", name: number, widget: string, hint: "e.g. 150+, 2019, 5★" }
              - { label: "Label", name: label, widget: string, hint: "e.g. Projects Completed" }

  # -----------------------------------------------------------
  # SERVICES
  # -----------------------------------------------------------
  - name: services
    label: "Services"
    description: "Manage service cards shown on the website"
    label_singular: "Service"
    files:
      - name: services_list
        label: "Services List"
        file: "src/data/services.json"
        fields:
          - label: "Services"
            name: services
            widget: list
            root: true
            fields:
              - { label: "ID (no spaces)", name: id, widget: string }
              - { label: "Service Title", name: title, widget: string }
              - { label: "Short Description", name: description, widget: text }
              - { label: "Link (href)", name: href, widget: string }
              - label: "Service Items"
                name: items
                widget: list
                field: { label: "Item", name: item, widget: string }

  # -----------------------------------------------------------
  # GALLERY
  # -----------------------------------------------------------
  - name: gallery
    label: "Gallery"
    description: "Add and edit project photos by category"
    label_singular: "Gallery Item"
    files:
      - name: fences_list
        label: "Fences"
        file: "src/data/gallery-fences.json"
        fields:
          - label: "Gallery"
            name: gallery
            widget: list
            root: true
            fields:
              - { label: "Project Title", name: title, widget: string }
              - { name: category, widget: hidden, default: "Fences" }
              - label: "Project Photo"
                name: image
                widget: image
              - { label: "Description", name: description, widget: text, required: false }

      - name: decks_railings_list
        label: "Stairs, Decks & Railings"
        file: "src/data/gallery-decks-railings.json"
        fields:
          - label: "Gallery"
            name: gallery
            widget: list
            root: true
            fields:
              - { label: "Project Title", name: title, widget: string }
              - { name: category, widget: hidden, default: "Stairs, Decks & Railings" }
              - label: "Project Photo"
                name: image
                widget: image
              - { label: "Description", name: description, widget: text, required: false }

      - name: flooring_list
        label: "Flooring"
        file: "src/data/gallery-flooring.json"
        fields:
          - label: "Gallery"
            name: gallery
            widget: list
            root: true
            fields:
              - { label: "Project Title", name: title, widget: string }
              - { name: category, widget: hidden, default: "Flooring" }
              - label: "Project Photo"
                name: image
                widget: image
              - { label: "Description", name: description, widget: text, required: false }

      - name: custom_list
        label: "Custom"
        file: "src/data/gallery-custom.json"
        fields:
          - label: "Gallery"
            name: gallery
            widget: list
            root: true
            fields:
              - { label: "Project Title", name: title, widget: string }
              - { name: category, widget: hidden, default: "Custom" }
              - label: "Project Photo"
                name: image
                widget: image
              - { label: "Description", name: description, widget: text, required: false }

  # -----------------------------------------------------------
  # REVIEWS
  # -----------------------------------------------------------
  - name: reviews
    label: "Client Reviews"
    description: "Add and manage client testimonials"
    label_singular: "Review"
    files:
      - name: reviews_list
        label: "Reviews List"
        file: "src/data/reviews.json"
        fields:
          - label: "Reviews"
            name: reviews
            widget: list
            root: true
            fields:
              - { label: "Client Name", name: name, widget: string }
              - { label: "Neighborhood", name: neighborhood, widget: string }
              - label: "Star Rating"
                name: stars
                widget: number
                default: 5
                min: 1
                max: 5
              - { label: "Review Text", name: text, widget: text }
              - label: "Review Photo"
                name: photo
                widget: image
                required: false
                default: "/images/placeholder-review.svg"

  # -----------------------------------------------------------
  # SEO LANDING PAGES
  # -----------------------------------------------------------
  - name: seo_pages
    label: "SEO Landing Pages"
    description: "Manage content for SEO service pages"
    folder: "src/data/seo-pages"
    format: json
    create: true
    slug: "{{slug}}"
    label_singular: "SEO Page"
    fields:
      - { label: "Page Title (h1)", name: pageTitle, widget: string }
      - { label: "Meta Title", name: metaTitle, widget: string }
      - { label: "Meta Description", name: metaDescription, widget: text }
      - { label: "Eyebrow Text", name: eyebrow, widget: string }
      - { label: "Subtitle", name: subtitle, widget: string }
      - { label: "Intro Section Title", name: introTitle, widget: string }
      - { label: "Intro Paragraph", name: intro, widget: text }
      - label: "Highlights"
        name: highlights
        widget: list
        fields:
          - label: "Icon"
            name: icon
            widget: select
            options:
              - arrow-path
              - badge-check
              - beaker
              - bolt
              - building-office-2
              - calendar-days
              - chat-bubble-left-right
              - check
              - clipboard-document-list
              - clock
              - globe-alt
              - hand-raised
              - home
              - leaf
              - map-pin
              - paint-brush
              - shield-check
              - sparkles
              - squares-2x2
              - sun
              - wrench-screwdriver
          - { label: "Title", name: title, widget: string }
          - { label: "Description", name: description, widget: text }
      - label: "Service Items"
        name: serviceItems
        widget: list
        field: { label: "Service", name: item, widget: string }
      - label: "Page Image"
        name: imageSrc
        widget: image
        required: false
      - { label: "Image Alt Text", name: imageAlt, widget: string, required: false }
      - { label: "Schema Name", name: schemaName, widget: string, hint: "e.g. Deck Builder Kauai" }
      - { label: "Schema Description", name: schemaDescription, widget: text, hint: "One sentence used in JSON-LD structured data" }
      - { label: "Schema Service Type", name: schemaServiceType, widget: string, hint: "e.g. Deck Construction, Fence Installation" }
