  <text x="60" y="38" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="10" fill="#5A8F29" letter-spacing="0.8">HOME IMPROVEMENT</text>
  <text x="60" y="51" font-family="Open Sans, 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="8" fill="#B9854D" letter-spacing="0.6">KAUAI, HAWAII · EST. 2019</text>
