<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Hero project photo placeholder">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071f3d"/>
      <stop offset="100%" style="stop-color:#0B2F56"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#heroGrad)"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <!-- House outline -->
  <g transform="translate(600, 300)" opacity="0.12">
    <polygon points="0,-120 140,-20 140,100 -140,100 -140,-20" fill="none" stroke="#5A8F29" stroke-width="3"/>
    <polygon points="0,-180 180,-20" fill="none" stroke="#5A8F29" stroke-width="3"/>
    <rect x="-40" y="20" width="80" height="80" fill="none" stroke="#5A8F29" stroke-width="3"/>
    <rect x="-80" y="-20" width="50" height="50" fill="none" stroke="#B9854D" stroke-width="3"/>
  </g>
  <!-- Text -->
  <text x="600" y="280" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="700" font-size="28" fill="rgba(255,255,255,0.25)">AD VALUE HOME IMPROVEMENT</text>
  <text x="600" y="320" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="16" fill="rgba(255,255,255,0.15)">Project Photo — Replace with real image (1200 × 600)</text>
  <text x="600" y="350" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="14" fill="rgba(185,133,77,0.4)">Kauai, Hawaii · Est. 2019</text>
</svg>
